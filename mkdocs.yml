site_name: Saber Docs
site_url: https://staticzoe.github.io/SaberDocs/
site_description: Documentation for Saber Unreal Engine plugins.
repo_url: https://github.com/StaticZoe/SaberDocs
repo_name: StaticZoe/SaberDocs
copyright: Copyright &copy; 2026 Stars Kiss. All rights reserved.

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - SaberDeep:
      - Overview: saberdeep/index.md
      - Quick Start: saberdeep/quick-start.md
      - Blueprint: saberdeep/blueprint.md
      - C++: saberdeep/cpp.md
      - Extending: saberdeep/extending.md
      - API Reference: saberdeep/api.md
      - Force Order: saberdeep/force-order.md
      - Release Notes: saberdeep/release-notes.md
      - Support: saberdeep/support.md
